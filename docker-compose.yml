services:
  neo4j:
    image: neo4j:5.26-community
    container_name: statnett-kg-neo4j
    ports:
      - "7474:7474"   # HTTP / Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/mvp-passord-123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      # Tillat WebSocket-tilkoblinger fra GUI-en
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_bolt_listen__address=0.0.0.0:7687
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data:/import:ro
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "mvp-passord-123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
